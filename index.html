<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Платёж обрабатывается</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #06070D;
      color: #F5F7FF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      background: #10131A;
      border: 1px solid rgba(143, 99, 255, 0.28);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .badge {
      display: inline-block;
      color: #33D17A;
      background: rgba(51, 209, 122, 0.12);
      border: 1px solid rgba(51, 209, 122, 0.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.15;
    }

    p {
      color: #A7AEC3;
      font-size: 16px;
      line-height: 1.55;
      margin: 0 0 14px;
    }

    .note {
      margin-top: 18px;
      color: #FFFFFF;
      background: rgba(143, 99, 255, 0.12);
      border-radius: 16px;
      padding: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">NOIR DELIVERY</div>
    <h1>Платёж обрабатывается</h1>
    <p>
      Если оплата прошла успешно, баланс в приложении обновится автоматически
      после подтверждения YooKassa.
    </p>
    <p>
      Вернитесь в приложение и откройте профиль ресторана.
    </p>
    <div class="note">
      Если баланс не обновился сразу, нажмите в приложении кнопку
      «Проверить последний платёж».
    </div>
  </main>
</body>
</html>
